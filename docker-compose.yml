services:
  mysql:
    image: mysql:8.0
    container_name: teacher-class-mysql
    restart: unless-stopped
    ports: ["3306:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: teacher_class_hub
      MYSQL_USER: teacher_app
      MYSQL_PASSWORD: teacher_app
      TZ: Asia/Ho_Chi_Minh
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+07:00
      - --innodb-buffer-pool-size=256M
      - --max-connections=50
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "teacher_app",
          "-pteacher_app",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
volumes:
  mysql-data:
