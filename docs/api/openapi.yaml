                sha256: {type: string, pattern: '^[a-f0-9]{64}$'}
            lessons: {type: array, items: {type: object}}
            tuitionRows: {type: array, items: {type: object}}
            paymentEvents: {type: array, items: {type: object}}
            tuitionCycles: {type: array, items: {type: object}}
            academicPeriods: {type: array, items: {type: object}}
            classCandidates: {type: array, items: {type: object}}
            summary: {type: object}
            warnings: {type: array, items: {type: string}}
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: {type: string, example: MISSING_ATTENDANCE}
            message: {type: string}
            details: {nullable: true}
