openapi: 3.0.3
info:
  title: Teacher Class Hub API
  version: 0.1.0
  description: API khung cho V1. Shared TypeScript contracts vẫn là source of truth khi code.
servers:
  - url: /api
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      security: []
      summary: Đăng nhập giáo viên
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: {type: string, format: email}
                password: {type: string}
      responses:
        '200': {description: Thành công}
  /auth/me:
    get:
      summary: User hiện tại
      responses:
        '200': {description: Thành công}
  /dashboard:
    get:
      summary: Dashboard cô giáo
      responses:
        '200': {description: Thành công}
  /classes:
    get:
      summary: Danh sách lớp
      responses:
        '200': {description: Thành công}
    post:
      summary: Tạo lớp
      responses:
        '201': {description: Đã tạo}
  /classes/{id}:
    get:
      summary: Chi tiết lớp
      parameters:
        - {$ref: '#/components/parameters/Id'}
      responses:
        '200': {description: Thành công}
  /classes/{id}/lessons:
    get:
      summary: Lịch sử buổi học của lớp
      parameters:
        - {$ref: '#/components/parameters/Id'}
      responses:
        '200': {description: Thành công}
  /students:
    get:
      summary: Danh sách học sinh
      responses:
        '200': {description: Thành công}
    post:
      summary: Tạo học sinh và enrollment
      responses:
        '201': {description: Đã tạo}
  /students/{id}:
    get:
      summary: Chi tiết học sinh
      parameters:
        - {$ref: '#/components/parameters/Id'}
      responses:
        '200': {description: Thành công}
  /students/{id}/tuition-mode:
    patch:
      summary: Đổi chế độ học phí
      parameters:
        - {$ref: '#/components/parameters/Id'}
      responses:
        '204': {description: Đã cập nhật}
  /lessons:
    post:
      summary: Tạo buổi học nháp
      responses:
        '201': {description: Đã tạo}
  /lessons/{id}/complete:
    post:
      summary: Hoàn thành buổi, điểm danh và phân bổ chu kỳ
      parameters:
        - {$ref: '#/components/parameters/Id'}
      responses:
        '200': {description: Thành công}
        '409': {description: State conflict}
  /tuition-cycles:
    get:
      summary: Danh sách chu kỳ
      parameters:
        - in: query
          name: status
          schema: {type: string}
      responses:
        '200': {description: Thành công}
  /tuition-cycles/{id}:
    get:
      summary: Chi tiết chu kỳ
      parameters:
        - {$ref: '#/components/parameters/Id'}
      responses:
        '200': {description: Thành công}
  /tuition-cycles/{id}/mark-paid:
    post:
      summary: Đánh dấu thu toàn bộ
      parameters:
        - {$ref: '#/components/parameters/Id'}
      responses:
        '204': {description: Đã thu}
  /schedule/unrecorded:
    get:
      summary: Buổi dự kiến chưa ghi nhận
      responses:
        '200': {description: Thành công}
  /schedule/week:
    get:
      summary: Lịch tuần và lịch bận
      responses:
        '200': {description: Thành công}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema: {type: integer, format: int64}
