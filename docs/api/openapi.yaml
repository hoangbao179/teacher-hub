openapi: 3.0.3
info:
  title: Teacher Class Hub API
  version: 0.6.0
  description: API release candidate V1, gồm vận hành lớp, báo cáo và production hardening qua M6D.
servers:
  - url: /
security:
  - bearerAuth: []
paths:
  /health:
    get: {security: [], summary: Liveness, responses: {'200': {description: OK}}}
  /ready:
    get: {security: [], summary: Database readiness, responses: {'200': {description: Ready}, '503': {description: MySQL chưa sẵn sàng}}}
  /api/auth/login:
    post:
      security: []
      summary: Đăng nhập giáo viên
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties: {username: {type: string, minLength: 3, maxLength: 64}, password: {type: string}}
      responses: {'200': {description: Thành công}, '401': {description: Sai thông tin đăng nhập}, '429': {description: Quá nhiều lần đăng nhập sai; có Retry-After}}
  /api/auth/logout:
    post: {summary: Kết thúc session phía client, responses: {'204': {description: Đã đăng xuất}}}
  /api/auth/me:
    get: {summary: Đọc authoritative user từ database, responses: {'200': {description: Thành công}, '401': {description: Token không hợp lệ}}}
  /api/dashboard:
    get:
      summary: Dashboard giáo viên với học phí, đối soát và lịch hôm nay từ dữ liệu thật
      responses:
        '200': {description: Thành công, content: {application/json: {schema: {$ref: '#/components/schemas/DashboardEnvelope'}}}}
  /api/classes:
    get: {summary: Danh sách lớp, responses: {'200': {description: Thành công}}}
    post: {summary: Tạo lớp và lịch lặp, responses: {'201': {description: Đã tạo}}}
  /api/classes/{id}:
    get: {summary: Chi tiết lớp gồm schedules và active students, parameters: [{$ref: '#/components/parameters/Id'}], responses: {'200': {description: Thành công}}}
    patch: {summary: Cập nhật lớp và lịch lặp, parameters: [{$ref: '#/components/parameters/Id'}], responses: {'204': {description: Đã cập nhật}}}
  /api/classes/{id}/pause:
    post: {summary: Tạm dừng lớp theo ngày hiệu lực, parameters: [{$ref: '#/components/parameters/Id'}], requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/EffectiveStatusRequest'}}}}, responses: {'204': {description: Đã tạm dừng}}}
  /api/classes/{id}/resume:
    post: {summary: Mở lại lớp theo ngày hiệu lực, parameters: [{$ref: '#/components/parameters/Id'}], requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/EffectiveStatusRequest'}}}}, responses: {'204': {description: Đã mở lại}}}
  /api/classes/{id}/close:
    post: {summary: Đóng lớp theo ngày hiệu lực và giữ lịch sử, parameters: [{$ref: '#/components/parameters/Id'}], requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/EffectiveStatusRequest'}}}}, responses: {'204': {description: Đã đóng}}}
  /api/classes/{id}/enrollments:
    post: {summary: Ghi danh học sinh vào lớp ACTIVE, parameters: [{$ref: '#/components/parameters/Id'}], responses: {'201': {description: Đã ghi danh}, '409': {description: Vi phạm trạng thái hoặc uniqueness}}}
  /api/classes/{id}/schedules:
    post: {summary: Tạo lịch lặp, parameters: [{$ref: '#/components/parameters/Id'}], responses: {'201': {description: Đã tạo}}}
  /api/classes/{id}/lessons:
    get: {summary: Lịch sử lesson hiện có của lớp, parameters: [{$ref: '#/components/parameters/Id'}], responses: {'200': {description: Thành công}}}
  /api/recurring-schedules/{id}:
    patch: {summary: Tạo version lịch lặp mới từ effectiveFrom, parameters: [{$ref: '#/components/parameters/Id'}], responses: {'204': {description: Đã tạo version}}}
    delete: {summary: End-date lịch lặp, không hard-delete lịch sử, parameters: [{$ref: '#/components/parameters/Id'}], requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/EffectiveStatusRequest'}}}}, responses: {'204': {description: Đã kết thúc version}}}
  /api/students:
    get: {summary: Danh sách học sinh, responses: {'200': {description: Thành công}}}
    post: {summary: Tạo học sinh, responses: {'201': {description: Đã tạo}}}
  /api/students/{id}:
    get: {summary: Chi tiết học sinh, parameters: [{$ref: '#/components/parameters/Id'}], responses: {'200': {description: Thành công}}}
    patch: {summary: Cập nhật học sinh, parameters: [{$ref: '#/components/parameters/Id'}], responses: {'204': {description: Đã cập nhật}}}
  /api/students/{studentId}/export.xlsx:
    get:
      summary: Xuất workbook XLSX chuẩn hóa cho một học sinh
      description: |
        Dữ liệu lấy từ MySQL authoritative. `fromDate`/`toDate` lọc theo ngày học
        thực tế; `classId` chỉ hợp lệ khi học sinh có lịch sử ghi danh tại lớp đó.
        Workbook không được lưu trong database và thao tác tạo audit
        `STUDENT_REPORT_EXPORTED`.
      parameters:
        - {in: path, name: studentId, required: true, schema: {type: integer, format: int64, minimum: 1}}
        - {in: query, name: fromDate, schema: {type: string, format: date}}
        - {in: query, name: toDate, schema: {type: string, format: date}}
        - {in: query, name: classId, schema: {type: integer, format: int64, minimum: 1}}
      responses:
        '200':
          description: Workbook gồm Quá trình học tập, Học phí và Tổng hợp
          headers:
            Content-Disposition:
              schema: {type: string}
              description: Attachment filename an toàn cho Windows/macOS
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema: {type: string, format: binary}
        '400': {$ref: '#/components/responses/ValidationError'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '413': {description: Báo cáo vượt giới hạn 5.000 dòng}
  /api/students/{studentId}/legacy-imports/preview:
    post:
      summary: Phân tích và đối soát workbook lịch sử của một học sinh, không ghi dữ liệu nghiệp vụ
      parameters:
        - {in: path, name: studentId, required: true, schema: {type: integer, format: int64, minimum: 1}}
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: {type: string, format: binary, description: File XLSX tối đa 10 MB}
      responses:
        '200': {description: Preview-only, content: {application/json: {schema: {$ref: '#/components/schemas/LegacyImportPreviewEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
        '413': {description: File vượt quá 10 MB}
  /api/enrollments/{id}/pause:
    post: {summary: Tạm dừng ghi danh theo ngày hiệu lực, parameters: [{$ref: '#/components/parameters/Id'}], requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/EffectiveStatusRequest'}}}}, responses: {'204': {description: Đã tạm dừng}}}
  /api/enrollments/{id}/resume:
    post: {summary: Mở lại ghi danh theo ngày hiệu lực nếu lớp ACTIVE, parameters: [{$ref: '#/components/parameters/Id'}], requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/EffectiveStatusRequest'}}}}, responses: {'204': {description: Đã mở lại}}}
  /api/enrollments/{id}/end:
    post: {summary: Kết thúc ghi danh và giữ lịch sử, parameters: [{$ref: '#/components/parameters/Id'}], responses: {'204': {description: Đã kết thúc}}}
  /api/enrollments/{id}/transfer:
    post: {summary: Chuyển lớp atomic, bắt đầu enrollment mới ở 0/8 và giữ lịch sử cũ, parameters: [{$ref: '#/components/parameters/Id'}], responses: {'201': {description: Đã chuyển lớp}, '409': {$ref: '#/components/responses/Conflict'}}}
  /api/enrollments/{id}/tuition-receipts:
    get: {summary: Danh sách khoản thu trước của ghi danh, parameters: [{$ref: '#/components/parameters/Id'}], responses: {'200': {description: Thành công}}}
  /api/enrollments/{id}/tuition-receipts/advance:
    post: {summary: Thu trước đúng toàn bộ giá một gói theo snapshot ngày nhận, parameters: [{$ref: '#/components/parameters/Id'}], responses: {'201': {description: Đã thu trước}, '409': {$ref: '#/components/responses/Conflict'}}}
  /api/enrollments/{id}/tuition-mode:
    patch: {summary: Đổi tuition mode có effective date, parameters: [{$ref: '#/components/parameters/Id'}], responses: {'204': {description: Đã cập nhật}}}
  /api/lessons:
    post:
      summary: Tạo lesson draft và participant snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateLessonRequest'}
            examples:
              regular: {value: {classId: 1, sessionDate: '2026-07-20', scheduledStartTime: '18:00', scheduledEndTime: '19:30', lessonType: REGULAR}}
              makeup: {value: {classId: 1, sessionDate: '2026-07-20', scheduledStartTime: '20:00', scheduledEndTime: '21:00', lessonType: MAKEUP, selectedEnrollmentIds: [10, 11]}}
      responses:
        '201': {description: Draft đầy đủ, content: {application/json: {schema: {$ref: '#/components/schemas/LessonEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '409': {$ref: '#/components/responses/Conflict'}
  /api/lessons/{id}:
    get:
      summary: Chi tiết lesson và participant snapshot
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses:
        '200': {description: Thành công, content: {application/json: {schema: {$ref: '#/components/schemas/LessonEnvelope'}}}}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
    patch:
      summary: Cập nhật draft hoặc ngày/giờ completed mutable; paid boundary trả conflict
      parameters: [{$ref: '#/components/parameters/Id'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/UpdateLessonRequest'}}}}
      responses:
        '200': {description: Draft đã cập nhật, content: {application/json: {schema: {$ref: '#/components/schemas/LessonEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '409': {$ref: '#/components/responses/Conflict'}
  /api/lessons/{id}/participants:
    put:
      summary: Thay participant snapshot; completed cần gửi đủ attendance và không được chạm PAID
      parameters: [{$ref: '#/components/parameters/Id'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/UpdateParticipantsRequest'}}}}
      responses:
        '200': {description: Draft đã cập nhật, content: {application/json: {schema: {$ref: '#/components/schemas/LessonEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '409': {$ref: '#/components/responses/Conflict'}
  /api/lessons/{id}/attendances:
    put:
      summary: Lưu điểm danh draft hoặc sửa completed mutable và recalculation atomically
      parameters: [{$ref: '#/components/parameters/Id'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/UpdateAttendancesRequest'}}}}
      responses:
        '200': {description: Draft đã cập nhật, content: {application/json: {schema: {$ref: '#/components/schemas/LessonEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '409': {$ref: '#/components/responses/Conflict'}
  /api/lessons/{id}/content:
    put:
      summary: Lưu nội dung, bài tập và ghi chú draft
      parameters: [{$ref: '#/components/parameters/Id'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/UpdateContentRequest'}}}}
      responses:
        '200': {description: Draft đã cập nhật, content: {application/json: {schema: {$ref: '#/components/schemas/LessonEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '409': {$ref: '#/components/responses/Conflict'}
  /api/lessons/{id}/complete:
    post:
      summary: Hoàn thành lesson và phân bổ tuition atomically; replay COMPLETED không nhân đôi
      parameters: [{$ref: '#/components/parameters/Id'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/CompleteLessonRequest'}}}}
      responses:
        '200': {description: Completion summary, content: {application/json: {schema: {$ref: '#/components/schemas/CompleteLessonEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '409': {$ref: '#/components/responses/Conflict'}
  /api/lessons/{id}/cancel:
    post:
      summary: Hủy lesson DRAFT; lesson gắn occurrence đồng thời tạo SKIPPED exception
      parameters: [{$ref: '#/components/parameters/Id'}]
      requestBody: {required: true, content: {application/json: {schema: {type: object, required: [reason], properties: {reason: {type: string, maxLength: 255}}}}}}
      responses:
        '204': {description: Đã hủy}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '409': {$ref: '#/components/responses/Conflict'}
  /api/tuition-cycles:
    get:
      summary: Danh sách chu kỳ có lọc, sắp xếp và phân trang
      parameters:
        - {in: query, name: status, schema: {type: string, enum: [ACCUMULATING, PAYMENT_DUE, PAID, INCOMPLETE]}}
        - {in: query, name: classId, schema: {type: integer, format: int64}}
        - {in: query, name: studentId, schema: {type: integer, format: int64}}
        - {in: query, name: enrollmentId, schema: {type: integer, format: int64}}
        - {in: query, name: search, schema: {type: string, maxLength: 100}}
        - {in: query, name: from, schema: {type: string, format: date}, description: Ngày vòng đời cycle từ ngày này}
        - {in: query, name: to, schema: {type: string, format: date}, description: Ngày vòng đời cycle đến ngày này}
        - {in: query, name: sort, schema: {type: string, enum: [OLDEST_DUE, NEWEST, STUDENT_NAME], default: OLDEST_DUE}}
        - {in: query, name: page, schema: {type: integer, minimum: 1, default: 1}}
        - {in: query, name: pageSize, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
      responses:
        '200': {description: Trang chu kỳ, content: {application/json: {schema: {$ref: '#/components/schemas/TuitionCycleListEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
  /api/tuition-cycles/summary:
    get:
      summary: Tổng hợp học phí cho Dashboard; khoảng ngày chỉ áp dụng cho số cycle đã thu
      parameters:
        - {in: query, name: from, schema: {type: string, format: date}}
        - {in: query, name: to, schema: {type: string, format: date}}
      responses:
        '200': {description: Tổng hợp bằng SQL, content: {application/json: {schema: {$ref: '#/components/schemas/TuitionSummaryEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
  /api/tuition-cycles/{id}:
    get:
      summary: Chi tiết chu kỳ với item theo stored sequence
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses:
        '200': {description: Chi tiết chu kỳ, content: {application/json: {schema: {$ref: '#/components/schemas/TuitionCycleDetailEnvelope'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
  /api/tuition-cycles/{id}/mark-paid:
    post:
      summary: Đánh dấu thanh toán toàn bộ, transactional/audited/idempotent
      parameters: [{$ref: '#/components/parameters/Id'}]
      requestBody:
        required: true
        content: {application/json: {schema: {$ref: '#/components/schemas/MarkTuitionPaidRequest'}}}
      responses:
        '200': {description: Kết quả thanh toán hoặc replay đồng nhất, content: {application/json: {schema: {$ref: '#/components/schemas/MarkTuitionPaidEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}
  /api/tuition-cycles/{id}/settle-incomplete:
    post: {summary: Chốt hoặc miễn đợt dở dang mà không đổi status INCOMPLETE thành PAID, parameters: [{$ref: '#/components/parameters/Id'}], responses: {'200': {description: Đã xử lý}, '409': {$ref: '#/components/responses/Conflict'}}}
  /api/schedule/unrecorded:
    get:
      summary: Compatibility view cho occurrence chưa ghi nhận trong lookback 1–60 ngày
      parameters:
        - {in: query, name: days, schema: {type: integer, minimum: 1, maximum: 60, default: 14}}
      responses: {'200': {description: Danh sách occurrence chưa ghi nhận}}
  /api/schedule/occurrences:
    get:
      summary: Project và đối soát occurrence từ lịch lặp, exception và lesson hiện có
      parameters:
        - {in: query, name: from, schema: {type: string, format: date}}
        - {in: query, name: to, schema: {type: string, format: date}}
        - {in: query, name: classId, schema: {type: integer, format: int64}}
        - {in: query, name: state, schema: {$ref: '#/components/schemas/ReconciliationState'}}
        - {in: query, name: lookbackDays, schema: {type: integer, minimum: 1, maximum: 60, default: 14}}
      responses:
        '200': {description: Occurrence theo thứ tự cũ nhất trước, content: {application/json: {schema: {$ref: '#/components/schemas/ScheduleOccurrenceListEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
  /api/schedule/occurrences/bulk-create-drafts:
    post:
      summary: Tạo độc lập nhiều lesson DRAFT qua canonical lesson workflow
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/BulkOccurrenceRequest'}}}}
      responses:
        '200': {description: Kết quả rõ ràng theo từng occurrence, content: {application/json: {schema: {$ref: '#/components/schemas/BulkOccurrenceResultEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
  /api/schedule/occurrences/bulk-skip:
    post:
      summary: Đánh dấu nghỉ nhiều occurrence với lý do chung và kết quả theo từng item
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/BulkSkipOccurrenceRequest'}}}}
      responses:
        '200': {description: Kết quả rõ ràng theo từng occurrence, content: {application/json: {schema: {$ref: '#/components/schemas/BulkOccurrenceResultEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
  /api/schedule/occurrences/{key}/create-draft:
    post:
      summary: Tạo lesson DRAFT idempotent từ occurrence và trả đường dẫn lesson wizard
      parameters: [{$ref: '#/components/parameters/OccurrenceKey'}]
      responses:
        '200': {description: Draft canonical; không tạo attendance hoặc tuition, content: {application/json: {schema: {$ref: '#/components/schemas/CreateOccurrenceDraftEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}
  /api/schedule/makeup-outstanding:
    get: {summary: Entitlement học bù còn OPEN/RESERVED không giới hạn lookback, responses: {'200': {description: Danh sách theo nguồn và học sinh}}}
  /api/schedule/occurrences/{key}/makeup-options:
    get:
      summary: Đọc nguồn nghỉ/hủy và eligibility participant cho học bù subset
      parameters: [{$ref: '#/components/parameters/OccurrenceKey'}]
      responses:
        '200': {description: Nguồn và trạng thái replacement từng học sinh, content: {application/json: {schema: {$ref: '#/components/schemas/MakeupSourceOptionsEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
        '409': {$ref: '#/components/responses/Conflict'}
  /api/schedule/occurrences/{key}/skip:
    post:
      summary: Tạo SKIPPED exception idempotent cho đúng một occurrence
      parameters: [{$ref: '#/components/parameters/OccurrenceKey'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/SkipOccurrenceRequest'}}}}
      responses:
        '200': {description: Exception đã lưu cùng original date/time và actor, content: {application/json: {schema: {$ref: '#/components/schemas/ScheduleExceptionEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}
  /api/schedule/occurrences/{key}/reschedule:
    post:
      summary: Tạo RESCHEDULED exception cho một occurrence và trả cảnh báo xung đột
      parameters: [{$ref: '#/components/parameters/OccurrenceKey'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/RescheduleOccurrenceRequest'}}}}
      responses:
        '200': {description: Exception và conflict warnings, content: {application/json: {schema: {$ref: '#/components/schemas/ScheduleExceptionEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}
  /api/schedule/week:
    get:
      summary: Lịch tuần gồm projections đã đối soát và lịch bận
      parameters:
        - {in: query, name: from, schema: {type: string, format: date}}
      responses:
        '200': {description: Thành công, content: {application/json: {schema: {$ref: '#/components/schemas/WeekScheduleEnvelope'}}}}
  /api/schedule/conflicts/check:
    post:
      summary: Preflight conflict dùng chung cho lesson, occurrence, reschedule và lịch bận
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ScheduleConflictCheckRequest'}}}}
      responses:
        '200': {description: Danh sách cảnh báo không chặn, content: {application/json: {schema: {type: object, required: [data], properties: {data: {type: array, items: {$ref: '#/components/schemas/ScheduleConflictWarning'}}}}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
  /api/schedule/temporary-reschedules/preview:
    post:
      summary: Xem trước đổi lịch tạm thời, không ghi database
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/TemporaryRescheduleRequest'}}}}
      responses:
        '200': {description: Preview occurrence và conflict, content: {application/json: {schema: {$ref: '#/components/schemas/TemporaryReschedulePreviewEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
        '404': {$ref: '#/components/responses/NotFound'}
  /api/schedule/temporary-reschedules:
    post:
      summary: Tạo atomic RESCHEDULED exceptions cho khoảng tạm thời
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/TemporaryRescheduleRequest'}}}}
      responses:
        '201': {description: Đã áp dụng toàn bộ, content: {application/json: {schema: {$ref: '#/components/schemas/TemporaryReschedulePreviewEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
        '409': {$ref: '#/components/responses/Conflict'}
  /api/teacher-busy-slots:
    get:
      summary: Danh sách định nghĩa lịch bận giao với khoảng ngày
      parameters:
        - {in: query, name: from, schema: {type: string, format: date}}
        - {in: query, name: to, schema: {type: string, format: date}}
      responses: {'200': {description: Thành công}}
    post:
      summary: Tạo lịch bận một lần hoặc hằng tuần và trả cảnh báo xung đột
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/TeacherBusySlotInput'}}}}
      responses:
        '201': {description: Đã tạo cùng conflict warnings, content: {application/json: {schema: {$ref: '#/components/schemas/TeacherBusySlotMutationEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
  /api/teacher-busy-slots/{id}:
    get:
      summary: Chi tiết định nghĩa lịch bận để sửa
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses:
        '200': {description: Thành công, content: {application/json: {schema: {type: object, required: [data], properties: {data: {$ref: '#/components/schemas/TeacherBusySlot'}}}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    patch:
      summary: Cập nhật lịch bận và trả cảnh báo xung đột
      parameters: [{$ref: '#/components/parameters/Id'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/TeacherBusySlotInput'}}}}
      responses:
        '200': {description: Đã cập nhật, content: {application/json: {schema: {$ref: '#/components/schemas/TeacherBusySlotMutationEnvelope'}}}}
        '400': {$ref: '#/components/responses/ValidationError'}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      summary: Xóa lịch bận; không có tác động attendance hoặc tuition
      parameters: [{$ref: '#/components/parameters/Id'}]
      responses:
        '204': {description: Đã xóa}
        '404': {$ref: '#/components/responses/NotFound'}
components:
  securitySchemes:
    bearerAuth: {type: http, scheme: bearer, bearerFormat: JWT}
  parameters:
    Id: {in: path, name: id, required: true, schema: {type: integer, format: int64}}
    OccurrenceKey: {in: path, name: key, required: true, schema: {type: string, maxLength: 160}, example: '12:34:2026-07-20'}
  responses:
    ValidationError:
      description: Dữ liệu không hợp lệ
      content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}
    Unauthorized:
      description: Chưa xác thực hoặc token không hợp lệ
      content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}
    Conflict:
      description: State, participant, policy hoặc concurrency conflict
      content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}
    NotFound:
      description: Không tìm thấy tài nguyên
      content: {application/json: {schema: {$ref: '#/components/schemas/ErrorEnvelope'}}}
  schemas:
    EffectiveStatusRequest:
      type: object
      required: [effectiveDate]
      properties:
        effectiveDate: {type: string, format: date}
        reason: {type: string, maxLength: 255}
    LessonType: {type: string, enum: [REGULAR, MAKEUP, EXTRA]}
    LessonStatus: {type: string, enum: [DRAFT, COMPLETED, CANCELLED]}
    AttendanceStatus: {type: string, enum: [PRESENT, ABSENT, FREE]}
    ReconciliationState: {type: string, enum: [UNRECORDED, RECORDED, SKIPPED, RESCHEDULED]}
    ProjectionSource: {type: string, enum: [RECURRING, RESCHEDULED]}
    ScheduleConflictWarning:
      type: object
      required: [kind, title, date, startTime, endTime]
      properties:
        kind: {type: string, enum: [PROJECTED_OCCURRENCE, LESSON, BUSY_SLOT]}
        id: {type: integer, format: int64, nullable: true}
        occurrenceKey: {type: string, nullable: true}
        title: {type: string}
        date: {type: string, format: date}
        startTime: {type: string}
        endTime: {type: string}
    ScheduleOccurrence:
      type: object
      required: [key, originalKey, occurrenceDate, originalOccurrenceDate, recurringScheduleId, classId, className, scheduledStartTime, scheduledEndTime, projectionSource, state, conflicts, skipReason]
      properties:
        key: {type: string}
        originalKey: {type: string}
        occurrenceDate: {type: string, format: date}
        originalOccurrenceDate: {type: string, format: date}
        recurringScheduleId: {type: integer, format: int64}
        classId: {type: integer, format: int64}
        className: {type: string}
        scheduledStartTime: {type: string}
        scheduledEndTime: {type: string}
        projectionSource: {$ref: '#/components/schemas/ProjectionSource'}
        state: {$ref: '#/components/schemas/ReconciliationState'}
        linkedLessonId: {type: integer, format: int64, nullable: true}
        linkedLessonStatus: {nullable: true, allOf: [{$ref: '#/components/schemas/LessonStatus'}]}
        exceptionId: {type: integer, format: int64, nullable: true}
        replacementDate: {type: string, format: date, nullable: true}
        replacementStartTime: {type: string, nullable: true}
        replacementEndTime: {type: string, nullable: true}
        conflicts: {type: array, items: {$ref: '#/components/schemas/ScheduleConflictWarning'}}
        skipReason: {type: string, nullable: true}
    ScheduleOccurrenceListEnvelope:
      type: object
      required: [data]
      properties: {data: {type: array, items: {$ref: '#/components/schemas/ScheduleOccurrence'}}}
    CreateOccurrenceDraftEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [occurrenceKey, lessonId, wizardPath, idempotent, conflicts]
          properties:
            occurrenceKey: {type: string}
            lessonId: {type: integer, format: int64}
            wizardPath: {type: string}
            idempotent: {type: boolean}
            conflicts: {type: array, items: {$ref: '#/components/schemas/ScheduleConflictWarning'}}
    SkipOccurrenceRequest:
      type: object
      required: [reason]
      properties: {reason: {type: string, maxLength: 255}, note: {type: string, maxLength: 2000}, makeupRequired: {type: boolean, default: true}}
    RescheduleOccurrenceRequest:
      allOf:
        - {$ref: '#/components/schemas/SkipOccurrenceRequest'}
        - type: object
          required: [replacementDate, replacementStartTime, replacementEndTime]
          properties:
            replacementDate: {type: string, format: date}
            replacementStartTime: {type: string}
            replacementEndTime: {type: string}
    ScheduleExceptionEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [occurrenceKey, exceptionId, type, idempotent, conflicts]
          properties:
            occurrenceKey: {type: string}
            exceptionId: {type: integer, format: int64}
            type: {type: string, enum: [SKIPPED, RESCHEDULED]}
            idempotent: {type: boolean}
            conflicts: {type: array, items: {$ref: '#/components/schemas/ScheduleConflictWarning'}}
    BulkOccurrenceRequest:
      type: object
      required: [keys]
      properties: {keys: {type: array, minItems: 1, maxItems: 50, uniqueItems: true, items: {type: string}}}
    BulkSkipOccurrenceRequest:
      allOf:
        - {$ref: '#/components/schemas/BulkOccurrenceRequest'}
        - {$ref: '#/components/schemas/SkipOccurrenceRequest'}
    BulkOccurrenceResultEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            type: object
            required: [key, success]
            properties:
              key: {type: string}
              success: {type: boolean}
              lessonId: {type: integer, format: int64}
              exceptionId: {type: integer, format: int64}
              wizardPath: {type: string}
              idempotent: {type: boolean}
              conflicts: {type: array, items: {$ref: '#/components/schemas/ScheduleConflictWarning'}}
              error: {type: object, properties: {code: {type: string}, message: {type: string}}}
    ScheduleConflictCheckRequest:
      type: object
      required: [date, startTime, endTime]
      properties:
        date: {type: string, format: date}
        startTime: {type: string}
        endTime: {type: string}
        excludedOccurrenceKey: {type: string}
        excludedLessonId: {type: integer, format: int64}
    TemporaryRescheduleRequest:
      type: object
      required: [classId, fromDate, toDate, mappings, reason]
      properties:
        classId: {type: integer, format: int64}
        fromDate: {type: string, format: date}
        toDate: {type: string, format: date}
        mappings:
          type: array
          minItems: 1
          maxItems: 7
          uniqueItems: true
          items:
            type: object
            required: [recurringScheduleId, replacementDayOfWeek, replacementStartTime, replacementEndTime]
            properties:
              recurringScheduleId: {type: integer, format: int64}
              replacementDayOfWeek: {type: integer, minimum: 1, maximum: 7}
              replacementStartTime: {type: string}
              replacementEndTime: {type: string}
        reason: {type: string, maxLength: 255}
        note: {type: string, maxLength: 2000}
        confirmConflicts: {type: boolean}
    TemporaryReschedulePreviewEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [items, canApply, conflictCount]
          properties:
            canApply: {type: boolean}
            conflictCount: {type: integer}
            items:
              type: array
              maxItems: 30
              items:
                type: object
                required: [originalOccurrenceKey, originalDate, originalStartTime, originalEndTime, replacementDate, replacementStartTime, replacementEndTime, currentState, eligible, conflicts]
                properties:
                  originalOccurrenceKey: {type: string}
                  originalDate: {type: string, format: date}
                  originalStartTime: {type: string}
                  originalEndTime: {type: string}
                  replacementDate: {type: string, format: date}
                  replacementStartTime: {type: string}
                  replacementEndTime: {type: string}
                  currentState: {$ref: '#/components/schemas/ReconciliationState'}
                  eligible: {type: boolean}
                  conflicts: {type: array, items: {$ref: '#/components/schemas/ScheduleConflictWarning'}}
    MakeupSourceOptionsEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [occurrenceKey, classId, className, originalDate, originalStartTime, originalEndTime, participants]
          properties:
            occurrenceKey: {type: string}
            classId: {type: integer, format: int64}
            className: {type: string}
            originalDate: {type: string, format: date}
            originalStartTime: {type: string}
            originalEndTime: {type: string}
            reason: {type: string, nullable: true}
            participants:
              type: array
              items:
                type: object
                required: [enrollmentId, studentName, alreadyReplaced]
                properties:
                  enrollmentId: {type: integer, format: int64}
                  studentName: {type: string}
                  studentNickname: {type: string, nullable: true}
                  alreadyReplaced: {type: boolean}
    TeacherBusySlotInput:
      type: object
      required: [title, recurrenceType, startTime, endTime]
      properties:
        title: {type: string, maxLength: 160}
        recurrenceType: {type: string, enum: [ONCE, WEEKLY]}
        dayOfWeek: {type: integer, minimum: 1, maximum: 7, nullable: true}
        specificDate: {type: string, format: date, nullable: true}
        startTime: {type: string}
        endTime: {type: string}
        effectiveFrom: {type: string, format: date, nullable: true}
        effectiveTo: {type: string, format: date, nullable: true}
        location: {type: string, maxLength: 255}
        note: {type: string, maxLength: 2000}
    TeacherBusySlotMutationEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [slot, conflicts]
          properties:
            slot: {$ref: '#/components/schemas/TeacherBusySlot'}
            conflicts: {type: array, items: {$ref: '#/components/schemas/ScheduleConflictWarning'}}
    TeacherBusySlot:
      allOf:
        - {$ref: '#/components/schemas/TeacherBusySlotInput'}
        - type: object
          required: [id, conflicts]
          properties:
            id: {type: integer, format: int64}
            dayOfWeek: {type: integer, minimum: 1, maximum: 7, nullable: true}
            specificDate: {type: string, format: date, nullable: true}
            effectiveFrom: {type: string, format: date, nullable: true}
            effectiveTo: {type: string, format: date, nullable: true}
            location: {type: string, nullable: true}
            note: {type: string, nullable: true}
            conflicts: {type: array, items: {$ref: '#/components/schemas/ScheduleConflictWarning'}}
    CalendarLessonEvent:
      type: object
      required: [id, classId, className, date, startTime, endTime, status, lessonType]
      properties:
        id: {type: integer, format: int64}
        sourceKey: {type: string, nullable: true}
        classId: {type: integer, format: int64}
        className: {type: string}
        date: {type: string, format: date}
        startTime: {type: string}
        endTime: {type: string}
        status: {$ref: '#/components/schemas/LessonStatus'}
        lessonType: {$ref: '#/components/schemas/LessonType'}
    CalendarBusyOccurrence:
      type: object
      required: [id, title, date, startTime, endTime]
      properties:
        id: {type: integer, format: int64}
        title: {type: string}
        date: {type: string, format: date}
        startTime: {type: string}
        endTime: {type: string}
        location: {type: string, nullable: true}
    WeekSchedule:
      type: object
      required: [from, to, occurrences, lessons, busyOccurrences, classSchedules, busySlots]
      properties:
        from: {type: string, format: date}
        to: {type: string, format: date}
        occurrences: {type: array, items: {$ref: '#/components/schemas/ScheduleOccurrence'}}
        lessons: {type: array, items: {$ref: '#/components/schemas/CalendarLessonEvent'}}
        busyOccurrences: {type: array, items: {$ref: '#/components/schemas/CalendarBusyOccurrence'}}
        classSchedules: {type: array, items: {type: object}}
        busySlots: {type: array, items: {type: object}}
    WeekScheduleEnvelope:
      type: object
      required: [data]
      properties: {data: {$ref: '#/components/schemas/WeekSchedule'}}
    DashboardEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [paymentDueCount, totalUnpaidAmount, accumulatingStudentCount, paidCycleCount, unrecordedCount, recentUnrecordedSessions, todaySchedule]
          properties:
            paymentDueCount: {type: integer}
            totalUnpaidAmount: {type: integer, format: int64}
            accumulatingStudentCount: {type: integer}
            paidCycleCount: {type: integer}
            unrecordedCount: {type: integer}
            recentUnrecordedSessions: {type: array, items: {type: object}}
            todaySchedule: {$ref: '#/components/schemas/WeekSchedule'}
    CreateLessonRequest:
      type: object
      required: [classId, sessionDate, scheduledStartTime, scheduledEndTime, lessonType]
      properties:
        classId: {type: integer, format: int64}
        sessionDate: {type: string, format: date}
        scheduledStartTime: {type: string, example: '18:00'}
        scheduledEndTime: {type: string, example: '19:30'}
        lessonType: {$ref: '#/components/schemas/LessonType'}
        selectedEnrollmentIds: {type: array, uniqueItems: true, items: {type: integer, format: int64}}
        makeupSourceOccurrenceKey: {type: string, maxLength: 160}
        note: {type: string, maxLength: 1000}
    UpdateLessonRequest:
      type: object
      properties:
        classId: {type: integer, format: int64}
        sessionDate: {type: string, format: date}
        scheduledStartTime: {type: string}
        scheduledEndTime: {type: string}
        actualStartTime: {type: string}
        actualEndTime: {type: string}
        lessonType: {$ref: '#/components/schemas/LessonType'}
        note: {type: string, maxLength: 1000}
        refreshParticipants: {type: boolean}
        selectedEnrollmentIds: {type: array, uniqueItems: true, items: {type: integer, format: int64}}
    UpdateParticipantsRequest:
      type: object
      required: [enrollmentIds]
      properties:
        enrollmentIds: {type: array, uniqueItems: true, items: {type: integer, format: int64}}
        attendances:
          description: Bắt buộc và đầy đủ khi sửa participant của lesson COMPLETED.
          type: array
          items: {$ref: '#/components/schemas/AttendanceInput'}
    AttendanceInput:
      type: object
      required: [enrollmentId, status]
      properties:
        enrollmentId: {type: integer, format: int64}
        status: {$ref: '#/components/schemas/AttendanceStatus'}
        studentNote: {type: string, maxLength: 1000}
    UpdateAttendancesRequest:
      type: object
      required: [attendances]
      properties: {attendances: {type: array, items: {$ref: '#/components/schemas/AttendanceInput'}}}
    UpdateContentRequest:
      type: object
      properties:
        content: {type: string, maxLength: 2000}
        homework: {type: string, maxLength: 2000}
        note: {type: string, maxLength: 1000}
    CompleteLessonRequest:
      allOf:
        - {$ref: '#/components/schemas/UpdateContentRequest'}
        - type: object
          required: [actualStartTime, actualEndTime, attendances]
          properties:
            actualStartTime: {type: string, example: '18:05'}
            actualEndTime: {type: string, example: '20:05'}
            attendances: {type: array, items: {$ref: '#/components/schemas/AttendanceInput'}}
    LessonParticipant:
      type: object
      required: [participantId, enrollmentId, studentId, studentName, tuitionMode]
      properties:
        participantId: {type: integer, format: int64}
        enrollmentId: {type: integer, format: int64}
        studentId: {type: integer, format: int64}
        studentName: {type: string}
        tuitionMode: {type: string, enum: [CLASS_DEFAULT, CUSTOM, FREE]}
        effectivePackagePrice: {type: integer, format: int64, nullable: true}
        currentProgress: {type: integer, minimum: 0, maximum: 8, nullable: true}
        attendance:
          nullable: true
          allOf: [{$ref: '#/components/schemas/AttendanceInput'}]
    LessonDetail:
      type: object
      required: [id, classId, className, sourceOccurrenceKey, sessionDate, scheduledStartTime, scheduledEndTime, lessonType, status, completedAt, cancelledAt, cancelReason, makeupSource, participants]
      properties:
        id: {type: integer, format: int64}
        classId: {type: integer, format: int64}
        className: {type: string}
        sourceOccurrenceKey: {type: string, nullable: true}
        sessionDate: {type: string, format: date}
        scheduledStartTime: {type: string}
        scheduledEndTime: {type: string}
        actualStartTime: {type: string, nullable: true}
        actualEndTime: {type: string, nullable: true}
        actualDurationMinutes: {type: integer, nullable: true}
        lessonType: {$ref: '#/components/schemas/LessonType'}
        status: {$ref: '#/components/schemas/LessonStatus'}
        completedAt: {type: string, format: date-time, nullable: true, description: Persisted completion time; null while not completed}
        cancelledAt: {type: string, format: date-time, nullable: true}
        cancelReason: {type: string, nullable: true}
        content: {type: string, nullable: true}
        homework: {type: string, nullable: true}
        note: {type: string, nullable: true}
        makeupSource: {type: object, nullable: true}
        participants: {type: array, items: {$ref: '#/components/schemas/LessonParticipant'}}
    LessonEnvelope:
      type: object
      required: [data]
      properties: {data: {$ref: '#/components/schemas/LessonDetail'}}
    CompleteLessonEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [lessonId, completedAt, attendanceCount, newlyDueCycles, lesson, actualDurationMinutes, presentCount, absentCount, freeCount, tuitionImpacts, recalculationConflict]
          properties:
            lessonId: {type: integer, format: int64}
            completedAt: {type: string, format: date-time, description: Persisted completion time returned unchanged on idempotent replay}
            attendanceCount: {type: integer}
            newlyDueCycles: {type: array, items: {type: object}}
            lesson: {$ref: '#/components/schemas/LessonDetail'}
            actualDurationMinutes: {type: integer}
            presentCount: {type: integer}
            absentCount: {type: integer}
            freeCount: {type: integer}
            tuitionImpacts: {type: array, items: {type: object}}
            recalculationConflict: {type: object, nullable: true}
    TuitionCycleStatus: {type: string, enum: [ACCUMULATING, PAYMENT_DUE, PAID, INCOMPLETE, CANCELLED]}
    TuitionCycleListItem:
      type: object
      required: [id, enrollmentId, cycleNumber, status, studentId, studentName, classId, className, packagePriceSnapshot, itemCount, targetCount, progress]
      properties:
        id: {type: integer, format: int64}
        enrollmentId: {type: integer, format: int64}
        cycleNumber: {type: integer}
        status: {$ref: '#/components/schemas/TuitionCycleStatus'}
        studentId: {type: integer, format: int64}
        studentName: {type: string}
        studentNickname: {type: string, nullable: true}
        classId: {type: integer, format: int64}
        className: {type: string}
        packagePriceSnapshot: {type: integer, format: int64}
        itemCount: {type: integer, minimum: 0, maximum: 8}
        targetCount: {type: integer, enum: [8]}
        progress: {type: integer, minimum: 0, maximum: 8}
        startedAt: {type: string, format: date, nullable: true}
        reachedTargetAt: {type: string, format: date, nullable: true}
        paidAt: {type: string, format: date, nullable: true}
        activeNextCycleProgress: {type: integer, minimum: 0, maximum: 7, nullable: true}
    TuitionCycleListEnvelope:
      type: object
      required: [data, meta]
      properties:
        data: {type: array, items: {$ref: '#/components/schemas/TuitionCycleListItem'}}
        meta:
          type: object
          required: [total, page, pageSize]
          properties: {total: {type: integer}, page: {type: integer}, pageSize: {type: integer}}
    TuitionCycleDetailEnvelope:
      type: object
      required: [data]
      properties:
        data:
          allOf:
            - {$ref: '#/components/schemas/TuitionCycleListItem'}
            - type: object
              required: [items]
              properties:
                paidAmount: {type: integer, format: int64, nullable: true}
                paymentMethod: {type: string, enum: [CASH, BANK_TRANSFER], nullable: true}
                paymentNote: {type: string, nullable: true}
                items:
                  type: array
                  items:
                    type: object
                    required: [sequenceNumber, attendanceId, lessonId, sessionDate, scheduledStartTime, scheduledEndTime, lessonType, attendanceStatus]
                    properties:
                      sequenceNumber: {type: integer, minimum: 1, maximum: 8}
                      attendanceId: {type: integer, format: int64}
                      lessonId: {type: integer, format: int64}
                      sessionDate: {type: string, format: date}
                      scheduledStartTime: {type: string}
                      scheduledEndTime: {type: string}
                      actualStartTime: {type: string, nullable: true}
                      actualEndTime: {type: string, nullable: true}
                      actualDurationMinutes: {type: integer, nullable: true}
                      lessonType: {$ref: '#/components/schemas/LessonType'}
                      attendanceStatus: {type: string, enum: [PRESENT]}
    MarkTuitionPaidRequest:
      type: object
      required: [paidAmount, paidAt, paymentMethod]
      properties:
        paidAmount: {type: integer, format: int64, minimum: 1}
        paidAt: {type: string, format: date}
        paymentMethod: {type: string, enum: [CASH, BANK_TRANSFER]}
        paymentNote: {type: string, maxLength: 1000}
    MarkTuitionPaidEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [cycleId, status, paidAmount, paidAt, paymentMethod, idempotent]
          properties:
            cycleId: {type: integer, format: int64}
            status: {type: string, enum: [PAID]}
            paidAmount: {type: integer, format: int64}
            paidAt: {type: string, format: date}
            paymentMethod: {type: string, enum: [CASH, BANK_TRANSFER]}
            paymentNote: {type: string, nullable: true}
            idempotent: {type: boolean}
    TuitionSummaryEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [paymentDueCount, totalUnpaidAmount, accumulatingEnrollmentCount, paidCycleCount]
          properties:
            paymentDueCount: {type: integer}
            totalUnpaidAmount: {type: integer, format: int64}
            accumulatingEnrollmentCount: {type: integer}
            paidCycleCount: {type: integer}
            from: {type: string, format: date, nullable: true}
            to: {type: string, format: date, nullable: true}
    LegacyImportPreviewEnvelope:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [mode, student, file, lessons, tuitionRows, paymentEvents, tuitionCycles, academicPeriods, classCandidates, summary, warnings]
          properties:
            mode: {type: string, enum: [PREVIEW_ONLY]}
            student: {type: object}
