name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: teacher_hub_test
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping -h localhost -prootpass --silent"
          --health-interval=10s --health-timeout=5s --health-retries=10
    env:
      NODE_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpass
      DB_NAME: teacher_hub_test
      JWT_SECRET: ci-only-secret-with-at-least-32-characters
      CHROME_PATH: /usr/bin/google-chrome
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install -g npm@12.0.1
      - run: npm ci
      - run: npm run check:full
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: verification-reports
          path: .agent-reports/

  deploy-production:
    name: Publish and deploy production
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: build
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/deploy.yml
    with:
      source_sha: ${{ github.sha }}
    secrets: inherit
